# Odoo module tests: PostgreSQL + install MODULE + unittest (--test-tags).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  odoo-tests:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ci_odoo_test
      DB_NAME: odoo
      DB_USER: odoo
      DB_HOST: db
      MODULE: odoo_square

    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL
        run: docker compose -f docker-compose.test.yml up -d db

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.test.yml exec -T db pg_isready -U "$DB_USER"; then
              exit 0
            fi
            sleep 1
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Build Odoo
        run: docker compose -f docker-compose.test.yml build odoo

      - name: Run tests
        run: |
          docker compose -f docker-compose.test.yml run --rm odoo \
            odoo \
              --config=/etc/odoo/odoo.conf \
              -d "$DB_NAME" \
              --db_host="$DB_HOST" \
              --db_port=5432 \
              --db_user="$DB_USER" \
              --db_password="$DB_PASSWORD" \
              -i "$MODULE" \
              --test-enable \
              --workers=0 \
              --stop-after-init \
              --test-tags="$MODULE" \
              --log-level=test

      - name: Logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
